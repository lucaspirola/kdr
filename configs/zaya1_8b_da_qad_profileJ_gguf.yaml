# kdr — ZAYA1-8B `da_qad` mode, Profile-J mixed-precision GGUF recovery.
#
# Phase 7.2 deployment-target recipe (HLR-0016 / LLR-0058). The spec_map
# patterns target ZAYA1's *actual* module names (Megatron-style fused),
# not canonical-HF names. Mapping from Profile-J's design intent:
#
#   gate+up (fused as linear_fc1; experts)  → IQ2_XS  (2.3125 bpw)
#   down   (linear_fc2; experts)             → Q3_K    (3.4375 bpw)
#   q / k attention (linear_q / linear_k)    → IQ4_XS  (4.25   bpw)
#   o attention (o_proj)                     → IQ4_XS  (4.25   bpw)
#   embed_tokens / lm_head (tied)            → Q5_K    (5.5    bpw)
#
# Modules left at F16 via the ZAYA1 adapter's `fp32_carve_outs` list
# (LLR-0057):
#
#   - `val_proj` substring: CCA value projections
#                           (`self_attn.qkv.val_proj{1,2}`) — F16
#                           per Profile-J intent.
#   - `router` substring:   routing softmax tree
#                           (`zaya_block.router`, `router.down_proj`,
#                           `router.rmsnorm_eda`).
#   - `norm` substring:     RMSNorms / LayerNorms.
#
# Estimated on-disk size: ~3.25 GB for ZAYA1-8B (8.84B params; tied
# embed/lm_head share storage). Target hardware: GTX 1050 Mobile
# (sm_6.1) loading the resulting `.gguf` under llama.cpp at usable
# context length.
#
# Runtime-only KV quant: during training the simulator uses INT4 K
# (per-channel) + INT4 V (per-token) — the KIVI scheme from the
# NVFP4 reference config. At llama.cpp inference time, pass
# `-ctk q4_0 -ctv q4_0` for symmetric INT4 KV cache (TurboQuant
# K=3/V=2 is deferred until ggml-org/llama.cpp#20969 lands).
#
# Run command: bootstrap.sh with
# `KDR_CONFIG=zaya1_8b_da_qad_profileJ_gguf.yaml` on 1× B200 (180 GB
# VRAM) ONLY. The run is near-OOM even on a B200 (teacher BF16 +
# student BF16 + STE parametrization cache + 8-bit AdamW state +
# activations + KD logits); 1× H200 (141 GB) does NOT fit, and
# neither does A100-80GB. Profile-J is single-GPU only — no
# multi-GPU sharding path is validated.

mode: da_qad

teacher:
  name_or_path: Zyphra/ZAYA1-8B
  revision: main
  torch_dtype: bfloat16
  attn_implementation: sdpa

student:
  source: Zyphra/ZAYA1-8B   # self-distillation from ZAYA1-8B (uniform
                            # per-layer architecture; the reasoning-base
                            # variant uses per-layer interleaved lists
                            # that the Zyphra fork does not handle —
                            # confirmed via live crash on instance 36666031)
  torch_dtype: bfloat16
  attn_implementation: sdpa

calibration:
  source: nvidia-cascade
  dataset: nvidia/Nemotron-Cascade-2-SFT-Data
  seed: 1337
  num_sequences: 13000
  sequence_length: 4096
  subset_weights:
    math: 0.21
    science: 0.11
    chat: 0.56
    instruction_following: 0.033
    conversational_agent: 0.0331
    swe: 0.02
    terminal_agent: 0.0331
  ptq_subset_size: 256

quant:
  weight:
    spec_map:
      - pattern: linear_fc1    # MoE expert gate+up (fused)
        bits: 2
        format: iq2_xs
        granularity: block
        transform: none
      - pattern: linear_fc2    # MoE expert down
        bits: 3
        format: q3_k
        granularity: block
        transform: none
      - pattern: linear_q      # attention query (CCA)
        bits: 4
        format: iq4_xs
        granularity: block
        transform: none
      - pattern: linear_k      # attention key (CCA)
        bits: 4
        format: iq4_xs
        granularity: block
        transform: none
      - pattern: o_proj        # attention output
        bits: 4
        format: iq4_xs
        granularity: block
        transform: none
      - pattern: embed_tokens  # input embedding (tied with lm_head)
        bits: 5
        format: q5_k
        granularity: block
        transform: none
      - pattern: lm_head       # output projection (tied with embed_tokens)
        bits: 5
        format: q5_k
        granularity: block
        transform: none
  kv_quant:
    key:
      bits: 4
      format: int
      granularity: channel  # KIVI: K per-channel
      transform: none
    value:
      bits: 4
      format: int
      granularity: token    # KIVI: V per-token
      transform: none

distillation:
  loss: forward_kld
  # Top-k FKLD with tail-mass correction. V≈150k for ZAYA1; k=512 keeps
  # bias <0.5% of the KL value while cutting the loss-path fp32 transient
  # from ~2.5 GB to ~50 MB per micro.
  kd_topk: 512
  # Temperature curriculum (borrowed from max_quality stage-5 KD):
  # linear ramp from `temperature_start` (4.0) at step 0 to `temperature`
  # (2.0) at the final step. High T early smooths the teacher target so
  # STE updates aren't chasing sharp peaks while IQ2_XS codebook
  # assignments are still settling. Endpoint at 2.0 (was 1.0) matches the
  # QAT literature consensus for ≤3-bit recovery (Q-LoRA §4.2, AWQ
  # recovery): T=1 over-sharpens the codebook-flip frontier and was a
  # plausible run-1 collapse contributor. τ-invariant `raw_kl = loss / T²`
  # remains the metric tracked across this schedule.
  temperature: 2.0
  temperature_start: 4.0
  # Muon (Keller Jordan, 2024) over 2D Linear weights; AdamW-8bit over
  # everything else (embeds, lm_head, RMSNorm scales, routers, val_proj,
  # biases). Split driven by the adapter's fp32_carve_outs pattern list.
  # Muon is published to be ~2× sample-efficient on hidden weight matrices.
  optimizer: muon_with_adamw
  # AdamW-group base LR. Kept at 5.0e-5 — the run-1 collapse rationale at
  # 2.3 bpw (IQ2_XS codebook-gap < per-step Δw) targeted the 2D Linear
  # updates that Muon now owns; the AdamW group is now embeddings + norms
  # + routers + biases where 5e-5 is the standard Q-LoRA / QAT range and
  # nothing has changed.
  learning_rate: 5.0e-5
  # Keep cosine decay ratio sane (~10× from peak to min) instead of
  # the previous ~110× tail; preserves learning signal in the tail.
  min_learning_rate: 5.0e-6
  weight_decay: 0.01
  # β₂ 0.999 → 0.95: faster second-moment EMA equilibration matches MoE
  # QAT precedent. The previous 0.999 needed ~10× the steps for the EMA
  # to stabilise, which underflowed the 20-step warmup. (AdamW group only.)
  betas: [0.9, 0.95]
  # Muon-group base LR. Keller Jordan's blog suggests Muon LR ≈ 50× AdamW
  # LR for unconstrained pretraining (→ 2.5e-3 from 5e-5). Profile-J's
  # IQ2_XS codebook-flip ceiling is the binding constraint on effective
  # per-step Δw, NOT Adam's effective LR — so the safe starting point is
  # slightly below the naïve ratio. Tune up if convergence is slow.
  muon_learning_rate: 2.0e-3
  muon_momentum: 0.95
  muon_nesterov: true
  muon_ns_steps: 5
  # Tighter clip; the run-1 trace had a clear precursor spike at step 15
  # before divergence kicked in at step 20.
  grad_clip_norm: 0.5
  # warmup 20 → 60 steps (~16% of run). Lets AdamW second moment settle
  # before the largest updates land; previous 5% was too aggressive for
  # the new (smaller) peak lr too.
  warmup_steps: 60
  total_tokens: 50_000_000
  per_device_batch_size: 1
  gradient_accumulation: 32
  sequence_length: 4096
  # Sequence-length curriculum: warmup runs at seq=2048, then ramps to
  # 4096 once warmup_steps completes. ~3× throughput on the first 60
  # steps, ~10% total wall-clock saved. RoPE handles variable seq
  # natively; total_steps stays derived from the post-warmup
  # sequence_length so the cosine schedule shape is unchanged.
  warmup_sequence_length: 2048
  log_every_n_steps: 5
  eval_every_n_steps: 50
  save_every_n_steps: 25  # Tighter rollback granularity (was 50). Costs
                          # ~2 min of save I/O per ~25 steps of training;
                          # cheap insurance after the run-1 catastrophe.
  # Freeze the student's MoE routers. Router replay already overrides the
  # student router's forward output with the teacher's at every MoE layer,
  # so backward through the replaced tensor doesn't reach the student
  # router's params anyway — but they're still in the optimizer state
  # eating 8-bit AdamW memory. <1% of params.
  trainable_scope: routers_frozen
  use_gradient_checkpointing: true
  # Probe the largest microbatch that fits VRAM at trainer init and rebalance
  # gradient_accumulation accordingly (tokens_per_step preserved). On B200
  # this typically buys 1.5-2× steady-state throughput.
  auto_batch_size: true
  # Async save_partial — overlaps the rank-0 disk-write with the next
  # forward+backward, saving ~10-30 s per partial on 8B BF16. Matches
  # the bf16_recovery config; the cost is ~weight-tensor-size of CPU
  # RAM per pending snapshot (~17 GB at 8B BF16).
  enable_async_save: true
  # Plateau guard: if raw_kl_ema > 3× best for 5 consecutive windows past
  # step 30, raise PlateauCollapse so the bootstrap script resumes from
  # the best-pointed partial. Defaults; tighten if run-1-style collapses
  # recur.
  plateau_guard_multiplier: 3.0
  plateau_guard_consecutive: 5
  plateau_guard_min_step: 30

eval:
  wikitext2:
    enabled: true
    sequence_length: 2048
    num_sequences: 64
