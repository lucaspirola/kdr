# Build the kdr portable runtime image and push to GHCR.
#
# Triggers:
#   - push to main (publishes :latest + :sha-<short>)
#   - push of a v* tag (also publishes :<tag>)
#   - manual dispatch (rebuild without code change, e.g. base-image bump)
#
# The image carries dependencies only; kdr code is cloned at container
# start by docker/bootstrap.sh.
#
# Security note: every `${{ ... }}` reference below resolves to a trusted
# action output (docker/metadata-action, docker/build-push-action) or a
# repo-level secret (GITHUB_TOKEN). No user-controllable inputs are
# interpolated into a shell `run:` step.
name: docker-build

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - ".github/workflows/docker-build.yml"
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR lowercases the namespace — keep this lowercase to match.
  IMAGE_NAME: lucaspirola/kdr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false   # we need docker for buildx
          swap-storage: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image digest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "Pushed $TAGS @ $DIGEST"
